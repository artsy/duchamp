name: 'Setup Node and Install Dependencies'
description: 'Sets up Node.js and installs dependencies'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  install-from-caller:
    description: 'Whether to install from caller directory or tooling directory'
    required: false
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache Yarn packages
      uses: actions/cache@v4
      with:
        path: ~/.yarn/berry/cache
        key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock', '.tooling/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-

    - name: Install packages
      shell: bash
      run: |
        if [ "${{ inputs.install-from-caller }}" == "true" ]; then
          INSTALL_DIR="."
        else
          INSTALL_DIR=".tooling"
        fi

        echo "Installing packages in: $INSTALL_DIR"
        cd "$INSTALL_DIR"
        yarn install --immutable
