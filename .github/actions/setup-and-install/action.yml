name: 'Setup Node and Install Dependencies'
description: 'Sets up Node.js and installs dependencies with Yarn version detection'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  install-from-caller:
    description: 'Whether to install from caller directory or tooling directory'
    required: false
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn
        cache-dependency-path: |
          yarn.lock
          .tooling/yarn.lock

    - name: Install packages
      shell: bash
      run: |
        if [ "${{ inputs.install-from-caller }}" == "true" ]; then
          INSTALL_DIR="."
        else
          INSTALL_DIR=".tooling"
        fi

        echo "Installing packages in: $INSTALL_DIR"
        cd "$INSTALL_DIR"

        echo "=== Yarn diagnostics ==="
        echo "which yarn: $(which yarn)"
        echo "yarn --version: $(yarn --version)"
        echo "corepack --version: $(corepack --version)"
        echo "packageManager field: $(node -e "console.log(require('./package.json').packageManager)")"
        echo "COREPACK_ENABLE_STRICT: $COREPACK_ENABLE_STRICT"
        echo "========================"

        YARN_VERSION=$(yarn --version)
        if [[ "$YARN_VERSION" =~ ^[234] ]]; then
          echo "Detected Yarn $YARN_VERSION (Berry)"
          yarn install --no-immutable
        else
          echo "Detected Yarn $YARN_VERSION (Classic)"
          yarn install --frozen-lockfile
        fi
